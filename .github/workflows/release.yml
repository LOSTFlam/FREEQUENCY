name: Release installers

# Builds FREEQUENCY installers for Windows / macOS / Linux and publishes a
# GitHub Release when you push a tag like v0.1.0 (or run manually).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version string (e.g. 0.1.0)"
        required: true
        default: "0.1.0"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure & build
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release --target FREEQUENCY --parallel

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Package
        shell: pwsh
        run: |
          $ver = "${{ github.event.inputs.version }}"
          if (-not $ver) { $ver = "${{ github.ref_name }}" -replace '^v','' }
          ./scripts/package.ps1 -Version $ver

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: dist/*

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release --target FREEQUENCY --parallel

      - name: Self-test
        run: ./build/src/FREEQUENCY_artefacts/Release/FREEQUENCY.app/Contents/MacOS/FREEQUENCY --selftest

      - name: Package DMG
        run: |
          VER="${{ github.event.inputs.version }}"
          [ -z "$VER" ] && VER="${GITHUB_REF_NAME#v}"
          bash packaging/macos/create-dmg.sh "$VER"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: macos-installers
          path: dist/*

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev libjack-jackd2-dev libcurl4-openssl-dev \
            libfreetype-dev libfontconfig1-dev libx11-dev libxcomposite-dev \
            libxcursor-dev libxext-dev libxinerama-dev libxrandr-dev libxrender-dev \
            libwebkit2gtk-4.1-dev libglu1-mesa-dev mesa-common-dev xvfb

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=g++ -DCMAKE_C_COMPILER=gcc
          cmake --build build --config Release --target FREEQUENCY --parallel

      - name: Self-test
        run: xvfb-run -a ./build/src/FREEQUENCY_artefacts/Release/FREEQUENCY --selftest

      - name: Package
        run: |
          VER="${{ github.event.inputs.version }}"
          [ -z "$VER" ] && VER="${GITHUB_REF_NAME#v}"
          bash packaging/linux/build-packages.sh "$VER"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: linux-installers
          path: dist/*

  publish:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List packages
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', github.event.inputs.version) }}
          name: FREEQUENCY ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', github.event.inputs.version) }}
          draft: false
          prerelease: true
          generate_release_notes: true
          files: artifacts/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
