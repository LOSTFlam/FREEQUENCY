name: Build FREEQUENCY

# Produces runnable binaries for every desktop platform:
#   - Windows : FREEQUENCY.exe
#   - macOS   : FREEQUENCY.app
#   - Linux   : FREEQUENCY (ELF)
# Download them from the workflow run's "Artifacts" section.

on:
  push:
    branches: [ main, "cursor/**" ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
          - os: windows-latest
            name: windows
          - os: macos-latest
            name: macos

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev libjack-jackd2-dev libcurl4-openssl-dev \
            libfreetype-dev libfontconfig1-dev libx11-dev libxcomposite-dev \
            libxcursor-dev libxext-dev libxinerama-dev libxrandr-dev libxrender-dev \
            libwebkit2gtk-4.1-dev libglu1-mesa-dev mesa-common-dev xvfb

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --target FREEQUENCY --parallel

      - name: Self-test (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a ./build/src/FREEQUENCY_artefacts/Release/FREEQUENCY --selftest

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: bash packaging/linux/build-packages.sh 0.1.0

      - name: Self-test (macOS)
        if: runner.os == 'macOS'
        run: ./build/src/FREEQUENCY_artefacts/Release/FREEQUENCY.app/Contents/MacOS/FREEQUENCY --selftest

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: bash packaging/macos/create-dmg.sh 0.1.0

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          ./scripts/package.ps1 -Version 0.1.0

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FREEQUENCY-${{ matrix.name }}
          path: |
            dist/**
            build/src/FREEQUENCY_artefacts/Release/FREEQUENCY
            build/src/FREEQUENCY_artefacts/Release/FREEQUENCY.exe
            build/src/FREEQUENCY_artefacts/Release/FREEQUENCY.app
          if-no-files-found: warn
